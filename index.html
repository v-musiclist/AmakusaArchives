<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title id="pageTitle"></title>
  <link rel="icon" href="./assets/siteicon.png" type="image/png" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div display="flex">
    <div>
      <header class="topbar">
    <div class="brand">
      <div class="brand__title" id="siteTitle"></div>
      <div class="brand__sub" id="siteSub"></div>
    </div>

  <div class="actions">
    <!-- SNS（PC表示用） -->
    <div class="social">
      <a class="sns-img-btn twitterBtn" id="twitterLink" target="_blank" rel="noopener">
      	<img src="./assets/twitter.png" alt="Twitter" width="80" height="40" />
      </a>
      <a class="sns-img-btn youtubeBtn" id="youtubeLink" target="_blank" rel="noopener">
      	<img src="./assets/youtube.png" alt="YouTube" width="80" height="40" />
      </a>
      <a class="sns-img-btn otherBtn" id="otherLink" target="_blank" rel="noopener">
      	<img src="./assets/others.png" alt="Others" width="80" height="40" />
      </a>
      <a class="sns-img-btn fanclubBtn" id="fanclubLink" target="_blank" rel="noopener">
      	<img src="./assets/fanclub.png" alt="Fanclub" width="80" height="40" />
      </a>
      <a class="sns-img-btn boothBtn" id="boothLink" target="_blank" rel="noopener">
      	<img src="./assets/booth.png" alt="Booth" width="80" height="40" />
      </a>
      <a class="sns-img-btn subBtn" target="_blank" rel="noopener">
      	<img src="./assets/sub.png" alt="Sub" width="80" height="40" />
      </a>
    </div>

    <!-- ハンバーガー（スマホ用） -->
    <button class="nav-toggle" id="navToggle"
      aria-label="menu" aria-expanded="false">☰</button>
  </div>
    </div>

    <div>
      <!-- タブナビゲーション -->
      <nav class="tabs">
        <button class="tab active" data-tab="home" aria-label="HOME TAB">HOME</button>
        <button class="tab" data-tab="live" aria-label="LIVE TAB">LIVE</button>
        <button class="tab" data-tab="music" aria-label="SONG TAB">SONG</button>
        <button class="tab" data-tab="video" aria-label="VIDEO TAB">VIDEO</button>
        <button class="tab" data-tab="contact" aria-label="CONTACT TAB">CONTACT</button>
      </nav>
    </div>
  </div>
  </header>

  <!-- スマホ用メニュー（SNS＋タブ） -->
  <div class="navpanel" id="navPanel" aria-hidden="true">
    <div class="navpanel__backdrop" id="navBackdrop"></div>

    <div class="navpanel__inner">
      <div class="navpanel__title">メニュー</div>

      <!-- SNS（ハンバーガーの中） -->
      <div class="navpanel__group">
        <a class="sns-img-btn twitterBtn" target="_blank" rel="noopener">
        	<img src="./assets/twitter.png" alt="Twitter" width="80" height="40" />
        </a>
        <a class="sns-img-btn youtubeBtn" target="_blank" rel="noopener">
        	<img src="./assets/youtube.png" alt="YouTube" width="80" height="40" />
        </a>
        <a class="sns-img-btn otherBtn" target="_blank" rel="noopener">
        	<img src="./assets/others.png" alt="Others" width="80" height="40" />
        </a>
        <a class="sns-img-btn fanclubBtn" target="_blank" rel="noopener">
        	<img src="./assets/fanclub.png" alt="Fanclub" width="80" height="40" />
        </a>
        <a class="sns-img-btn boothBtn" target="_blank" rel="noopener">
        	<img src="./assets/booth.png" alt="Booth" width="80" height="40" />
        </a>
        <a class="sns-img-btn subBtn" target="_blank" rel="noopener">
        	<img src="./assets/sub.png" alt="Sub" width="80" height="40" />
        </a>
      </div>

      <div class="ruleline"></div>

      <!-- タブ（スマホではこれを使う） -->
      <div class="navpanel__grid">
        <button class="tab tab--mobile" data-tab="home">HOME</button>
        <button class="tab tab--mobile" data-tab="live">LIVE</button>
        <button class="tab tab--mobile" data-tab="music">SONG</button>
        <button class="tab tab--mobile" data-tab="video">VIDEO</button>
        <button class="tab tab--mobile" data-tab="contact">CONTACT</button>
      </div>
    </div>
  </div>

  <main class="container">
    <!-- ホームタブ -->
    <section class="page active" data-page="home" id="homePage">
      <div class="card">
        <div class="card__head">
          <h2></h2>
        </div>
        <div id="homeFeatured" class="home-feature" aria-live="polite"></div>
      </div>
    </section>

    <!-- ライブタブ -->
    <section class="page" data-page="live" id="livePage">
      <section class="card">
        <div class="card__head">
          <h2>ライブ情報一覧</h2>
          <p class="muted" id="liveUpdateNote"></p>
        </div>
        <div id="liveList" class="live-list" aria-live="polite">読み込み中...</div>
      </section>
    </section>

    <!-- 曲一覧タブ -->
    <section class="page" data-page="music" id="musicPage">
      <div class="card">
        <div class="card__head">
          <h2>曲一覧</h2>
          <p class="muted" id="musicUpdateNote"></p>
        </div>
        <form class="song-search" id="songSearchForm">
          <input class="song-search__input" id="songSearchInput" type="text" placeholder="検索ワードを入力" aria-label="曲名・検索語検索" />
          <button class="song-search__button" type="submit">検索</button>
        </form>
        <div id="songList" class="song-list" aria-live="polite">読み込み中...</div>
      </div>
    </section>

    <!-- ビデオタブ -->
    <section class="page" data-page="video" id="videoPage">
      <div class="card">
        <div class="card__head">
          <h2>ビデオ一覧</h2>
          <p class="muted" id="videoUpdateNote"></p>
        </div>
        <div id="videoList" class="video-list" aria-live="polite">読み込み中...</div>
      </div>
    </section>

    <!-- お問い合わせタブ -->
    <section class="page" data-page="contact" id="contactPage">
      <div class="card">
        <div class="card__head">
          <h2>お問い合わせ</h2>
          <p class="muted" id="contactUpdateNote"></p>
        </div>
        <div class="contact-panel">
          <p class="contact-panel__intro">質問や、不具合のお問い合わせなどはこちらまで</p>
          <div class="contact-panel__actions">
            <div class="contact-panel__user" id="contactUserName">お問い合わせ先</div>
            <a class="contact-panel__button" id="contactButton" href="#" target="_blank" rel="noopener" aria-label="Twitterで問い合わせる">
              <img src="./assets/twitter.png" alt="Twitter" />
            </a>
          </div>

          <div class="contact-panel__divider" aria-hidden="true"></div>

          <div class="contact-panel__data">
            <p class="contact-panel__data-title">データについて</p>
            <p class="contact-panel__data-text">取り扱っているデータはスプレッドシートで保管しているものを使用しております</p>
            <a class="contact-panel__button spreadsBtn" href="#" target="_blank" rel="noopener" aria-label="スプレッドシートを開く">
              <img src="./assets/spreads.png" alt="スプレッドシート" />
            </a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="live-subpanel" id="liveSubpanel" aria-hidden="true">
    <div class="live-subpanel__backdrop" id="liveSubpanelBackdrop"></div>
    <div class="live-subpanel__panel" role="dialog" aria-modal="true" aria-labelledby="liveSubpanelTitle">
      <button class="live-subpanel__close" id="liveSubpanelClose" type="button" aria-label="サブパネルを閉じる">×</button>
      <div class="live-subpanel__content" id="liveSubpanelContent"></div>
    </div>
    <button class="scroll-to-top-btn scroll-to-top-btn--subpanel" id="subpanelScrollToTopBtn" type="button" aria-label="サブパネル上部へ戻る" hidden>↑</button>
  </div>

  <button class="scroll-to-top-btn" id="scrollToTopBtn" type="button" aria-label="ページ上部へ戻る" hidden>↑</button>

  <script src="./app.js"></script>
</body>
</html>
